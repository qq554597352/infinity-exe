name: Godot Test

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        run: |
          curl -L -o godot.zip "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_win64.exe.zip"
          powershell -Command "Expand-Archive -Force godot.zip ."
          dir

      - name: Validate Project
        run: |
          ./Godot_v4.2.2-stable_win64.exe --headless --check-only --path .
          if ($LASTEXITCODE -eq 0) { Write-Host "Project validation PASSED" }
          else { Write-Host "Project validation FAILED"; exit 1 }

      - name: Export Windows
        run: |
          mkdir -Force build
          ./Godot_v4.2.2-stable_win64.exe --headless --export-release "Windows Desktop" build/infinity_exe.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/

  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        run: |
          curl -L -o godot.zip "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip"
          unzip -o godot.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64
          mv Godot_v4.2.2-stable_linux.x86_64 godot4

      - name: Validate Project
        run: |
          ./godot4 --headless --check-only --path .

      - name: Export Linux
        run: |
          mkdir -p build
          ./godot4 --headless --export-release "Linux/X11" build/infinity_exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/
