name: Godot Build

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        run: |
          curl -L -o godot.zip "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_win64.exe.zip"
          powershell -Command "Expand-Archive -Force godot.zip ."

      - name: Export Windows
        run: |
          mkdir -Force build
          ./Godot_v4.2.2-stable_win64.exe --headless --export-release "Windows Desktop" build/infinity_exe.exe 2>&1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/
