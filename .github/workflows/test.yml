name: Godot Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GODOT_VERSION: "4.2.2"
  GODOT_VERSION_SHORT: "4.2"

jobs:
  test:
    name: Godot Tests
    runs-on: ubuntu-latest
    container:
      image: barthel/godot:${{ env.GODOT_VERSION }}-export-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          chmod +x -R $GITHUB_WORKSPACE

      - name: Run GUT Tests
        run: |
          godot${{ env.GODOT_VERSION_SHORT }} --headless -s res://addons/gut/gut_cmdln.gd -gexit

  build:
    name: Build Export
    runs-on: ubuntu-latest
    container:
      image: barthel/godot:${{ env.GODOT_VERSION }}-export-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          chmod +x -R $GITHUB_WORKSPACE

      - name: Export Linux
        run: |
          mkdir -p build
          godot${{ env.GODOT_VERSION_SHORT }} --headless --export-release "Linux/X11" build/infinity_exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/

  windows-build:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot
        run: |
          curl -L -o godot.zip "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_win64.exe.zip"
          powershell -Command "Expand-Archive -Force godot.zip ."

      - name: Export Windows
        run: |
          mkdir build
          ./Godot_v${{ env.GODOT_VERSION }}-stable_win64.exe --headless --export-release "Windows Desktop" build/infinity_exe.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/
